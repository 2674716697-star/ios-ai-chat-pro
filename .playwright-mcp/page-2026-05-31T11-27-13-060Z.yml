            - generic [ref=e106]:
              - text: 我们被要求开始故事。这是一个测试世界，角色是测试角色。我们需要写一个开场，引入剧情。然后给出@@SCENE块。我们需要遵守规则：角色视角，输出@@SCENE块包含所有字段。详细度ultra：身体细节4-6条，剧情总结2-3句，走向4条含后果/代价/机会。角色卡只有主角：测试角色，身份测试者。没有其他NPC。因此状态块中可能只有主角，除非我们引入NPC。我们可以在开场中创造一个场景和NPC。我们开始写故事正文，然后输出@@SCENE。
              - text: 由于是“开始故事”，我们可以设计一个简单的开场：测试角色在一个测试世界中醒来，周围是空白或实验室。为了有剧情，我们可以引入NPC：一个引导者或系统。我们设定场景：测试角色发现自己在一个充满屏幕的房间，一个AI声音向他解释这是模拟世界。这样我们可以有剧情推进。我们保持悬念：测试者即将接受测试。
              - text: 然后我们需要写@@SCENE块，包含主角状态，以及可能一个NPC状态。按照规则：“必须按人物分别输出状态：先输出主角完整状态块，再输出与主角当前强相关的1-3个NPC状态块。”所以我们要创造一个NPC，比如“系统声音”或“引导员”。我们设计NPC为“系统AI”，名字叫“主持人”。然后给状态。
              - text: 我们需要确保身体细节4-6条，基于正文。正文里描述主角的姿势、感官、环境等。我们会写一个开头。
          - generic [ref=e107]:
            - text: 测试角色睁开眼睛的瞬间，视网膜上残留的暗红色光斑尚未退去，耳边已经响起一阵轻柔的嗡鸣。他并不是躺在什么柔软的地方——脊椎正抵着一块冰凉的金属板，薄薄一层缓冲垫几乎没起到任何作用，寒意正沿着尾椎向上攀爬，像一条缓慢缠绕的蛇。空气中弥漫着似有似无的臭氧味，每一次吸气都让喉咙发干，鼻腔仿佛被看不见的微粒轻轻刺挠。
            - text: 他试图抬起右手，肘关节僵硬得像生了锈，肌肉传来一阵延迟的抗议。手指最终触碰到距离面部不到半米的透明屏障——是玻璃还是某种聚合物，指尖敲上去发出沉闷的低响，震动沿着指甲传回掌骨。头顶上方，几条冷白色灯带嵌在平整的灰白天花板里，光线无影、均匀，让整个空间显得既无菌又不真实。
            - text: “初始校准完成。测试者生命体征稳定。”一个没有明显性别特征的声音从四面八方同时涌来，仿佛墙壁本身就是扬声器。它不算刺耳，却让人本能地想缩起肩膀，“欢迎来到第四序列测试环境。当前任务载入中。请保持放松，你可能会感觉到轻微的定向障碍。”
            - text: 话音刚落，左侧视野的边缘突然亮起一串浮动的蓝色字符，像被烧灼在空气里的残像，一秒后迅速消散。测试角色的心跳漏了半拍——那不是真实的文字，而是直接投射进视觉皮层的感觉。他咽了口唾沫，喉结上下滚动，发出细微的咕噜声。小腿肌肉不自觉地绷紧，足弓微微拱起，趾尖在鞋底内徒劳地蜷曲。
            - text: 透明屏障表面开始浮现一层极淡的网格光，纵横交错，仿佛整个世界即将被拆解成可计算的数据点。他听到自己的呼吸声被放大——或许是舱室内的拾音器将声音回传给了他自己，形成一种令人不安的闭合回路。
