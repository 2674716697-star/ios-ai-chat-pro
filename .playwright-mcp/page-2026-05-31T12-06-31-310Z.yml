            - generic [ref=e180]:
              - text: 好的，现在我是测试角色了。我躺在这个冰冷的金属台上，面前是透明屏障，头顶是均匀得刺眼的白光，喉咙干得像砂纸。刚才我问了几个关键问题，系统给了我一堆术语——认知弹性、压力耐受、神经反射——还有一份听起来冠冕堂皇但细想全是陷阱的“权利条款”。暂停要他们批准，数据用途他们说了算，强制退出还要扣信用分……这哪是权利，这根本是免责声明。
              - text: 不过，至少我确认了两件事：第一，测试还没正式进入高风险阶段，我还有一点缓冲时间；第二，系统给了我一个明确的选择——要不要调取更多模块简介。这意味着现在主动权暂时还在我手里，哪怕只是看起来是。我必须在测试正式开始前，尽可能弄清我即将面对什么。选项A是直接调取简介，这能给我最直接的情报，但可能会加速进程；选项B是追问第四序列和前三序列的关系，这能让我了解外部的世界背景，但可能浪费时间；选项C是申请喝水，用生理需求当借口拖延，但暴露虚弱可能被系统记录；选项D是沉默观察，最保守但也可能一无所获。
              - text: 我刚才已经开口问了，系统也回应了。现在屏障上的光网格正在流动，它在等我做决定。我不能犹豫太久——犹豫本身就是一种数据，会被记录进所谓的“焦虑管理倾向”评估里。好，我决定选A。先搞清楚这个“当前测试模块”到底是什么，针对性了解总比盲目面对好。哪怕这会触发倒计时，有准备也比没准备好。
              - text: 我要把光针、视觉投射这些细节写出来，让场景更具体。肌肉反应也要跟上——脊椎僵直、手指蜷曲、唾液分泌不足，这些都是身体在压力下的真实反应。光网格加速流动，系统进入数据投影，技术总监的签名也出来了……这个世界比我想象的更制度化、更冷漠。最后节奏收紧，用“测试载入已就绪”和屏障变透明来推高紧张感，留给下一个决策。
          - generic [ref=e181]:
            - text: 他深吸一口气，那股臭氧味顺着气管一路向下，在肺里留下一种微微刺痒的存在感。“好，”他说，然后重复了一遍，这一次更坚定，“好。调取当前测试模块的详细简介，我要在开始之前知道我到底要面对什么。”
            - text: 系统没有用声音回应。取而代之的是右侧视野边缘突然亮起的一根极细的光针，细到像一根银白色头发丝，却锐利得让人本能想眨眼。光针自上而下划过一段约十厘米的距离，仿佛有人用看不见的手指在空中撕开了一道口子——然后，一面半透明的橙色面板从那条缝隙里“展开”出来，悬浮在他右手边大约四十厘米的位置。
            - text: 面板上浮现出一系列文字与图表，排列整齐但密度极高，像是给一个已经熟悉这套体系的人准备的速查手册，而不是给一个刚从金属台上醒来的测试者看的入门指南。他不得不微微眯起眼睛，视线在字里行间跳跃，寻找能让自己抓住什么的关键词。
            - text: 最顶部是一行深色的标题文字：
            - strong [ref=e182]: 「模块 4-A：基线人格锚定与冲突响应」
            - text: 。下方的描述文字大约有四五段，他用最快的速度扫过——前两段充斥着“人格矩阵”“基线采样”“双盲刺激”“自主决策追踪”之类的术语，像是在描述一种试图捕捉受试者思维模式的神经映射流程；第三段开始涉及具体流程，提到“将向测试者呈现一系列渐进增强的社会情境刺激”，包括“资源分配困境”“不可逆选择”“间接伤害权衡”；第四段用比周围文字小一号的字体注明了“预计认知负荷区间：中等至偏高”。
            - text: 他的目光停在了第四段末尾一个被括弧括起来的短句上：（本模块不含疼痛刺激或超过30dB的听觉应激源，但可能引发中等程度的情绪不适。）
            - text: 不含疼痛刺激。这个信息让他紧绷的肩膀几乎不可察觉地松了一点点——但紧接着括号里的后半句又让那份松弛被重新收回，像一根弹簧被拉到极限后猛地回弹。情绪不适。这个词太干净，也太模糊，把真实的痛苦包装成了一个可以用十号字体标注的温和注脚。
            - text: 他继续往下看，发现了另一段被淡色线条框起来的内容，像是补充说明：
            - strong [ref=e183]: 「注意：基线锚定阶段采集的人格参数将被用作后续模块的对照基准。本模块本身不包含高风险节点，但测试者在冲突情境中的初始反应模式将对后续资源配置产生权重影响。」
            - text: “初始反应模式将对后续资源配置产生权重影响。”他用沙哑的嗓音把这句话读了出来，嘴唇上干裂的死皮在摩擦时发出几不可闻的沙沙声。这句话翻译成普通人能听懂的措辞就是：接下来他要做的每一个选择，都会像滚雪球一样影响到后面一系列测试的难度和走向。而他对这个世界的了解，几乎为零。
            - text: 面板的右下角有一个微小的倒计时标志——不是数字，而是一个缓慢缩小的圆环，大约还有三分之二的大小。他不确定那是缓冲时间的剩余，还是测试开始的倒计时，但直觉告诉他，两者可能是一回事。
            - text: 他舔了舔上唇，舌尖触到一片粗糙的干皮。脊椎因为长时间维持同一个姿势而开始隐隐发酸，他让自己慢慢坐起来——屏障没有阻止这个动作，只是随着他的姿势变化微微调整了间距，始终保持着大约三十厘米的距离。他能感觉到后背上那块被金属板硌出的钝痛正在从腰眼向上蔓延，每一条竖脊肌都在发出沉默的抗议。
            - text: 那个平稳的声音再次响起：“简介已送达。测试将在准备阶段结束后自动进入第一情境。测试者编号四一七，你提出的每一个问题都将被记录——这是积极的应对行为，也是测试正在发生的一部分。”
            - text: 潜台词很清楚：从他说出第一句话开始，测试就已经启动了。
            - text: 透明屏障上的光网格流动速度微微加快，像一条河进入了浅滩。
