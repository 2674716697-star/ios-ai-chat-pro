            - generic [ref=e129]:
              - text: 好的，现在我是测试角色了。我刚刚从一个陌生的舱室里醒来，身体僵硬酸痛，嗓子干得要命，视网膜上还有奇怪的投影残像。头顶是冷白色的灯带，四周是冰冷的金属壁，空气里全是臭氧味。
              - text: 这个叫"系统主持人"的家伙刚才说了句测试即将开始，然后就直接往我的视觉神经里投射信息——这可不是什么正常体验。我不能就这么躺着等死，至少得搞清楚这到底是什么测试，是谁在操控这一切。
              - text: 好吧，既然选了A，我现在要做的就是尝试跟这个看不见的声音对话。我得小心措辞，不能显得太软弱，但也不能激起对方的敌意。先问问测试目的，再问问有没有不参与的选项——虽然我猜答案不会太好听，但至少能摸清对方的底线。
              - text: 我得把那种干渴、紧张、喉咙发紧的感觉都写出来，让对话既有人物的生理反应，又有心理博弈。同时还得记得，最后必须更新完整的@@SCENE状态块，给出下一步的四个选项……每个选项都要有动作和可能的后果，不能让角色陷入绝境。
          - generic [ref=e130]:
            - text: 他强迫自己把呼吸压得慢一些、稳一些，然后对着头顶那片灰白的天花板开口。声音比他预想中沙哑得多，像砂纸擦过木板，喉咙深处泛起一股淡淡的铁锈味——那是长时间没有进水的信号。
            - text: “等一下。”他咽了口唾沫，舌尖抵住上颚，试图刺激出一点唾液，“你说测试即将开始。什么测试？谁在运行这个程序？我需要更多信息。”
            - text: 话音刚落，舱室里陷入了一片短暂的沉默。透明屏障上的光网格微微跳动了一下，像水面被投入了一颗石子。测试角色的手指依然抵着屏障表面，指尖传来的温度比刚才略低了一点点，仿佛有看不见的冷流从屏障另一侧渗透过来。
            - text: 然后那个声音再次响起，语调依旧平稳，却多了一层微不可察的迟缓，仿佛在权衡措辞。
            - text: “回应查询：测试者编号四一七。你当前所处的第四序列测试环境，隶属于适应性评估协议框架。测试目的:评估测试者在未知变量下的认知弹性、压力耐受阈值及即时应答能力。测试内容:包含但不限于逻辑推演、情境判断、神经反射速度及情绪调控评估。”
            - text: 一段信息被直接投射进他的视野——这一次不是模糊的残像，而是一行行清晰的白色文字，悬浮在屏障前方约二十厘米的位置，像一面只有他自己能看到的透明屏幕。
            - text: 测试者权利条款(简化版)：
            - text: 1.测试者有权在任何阶段提出暂停请求，是否批准由主控系统判定。
            - text: 2.测试产生的一切神经数据将存入加密协议库，不会用于评估框架以外的用途。
            - text: 3.强制退出将导致本次测试记录作废，并扣除协议信用分。
            - text: 4.测试过程中，系统不承担因测试者隐瞒自身生理/心理风险而产生的不良后果。
            - text: 文字持续显示了大约五秒，然后像被风卷走的灰烬一样碎裂消散。测试角色的太阳穴一跳一跳地发紧，他下意识地眨了眨眼睛，睫毛扫过眼睑边缘时带起一阵微弱的刺痛——可能是那些视觉投射对眼部神经造成了额外的负担。
            - text: “也就是说……”他把右手从屏障上收回，指节因刚才无意识的用力而泛白，指尖微微发颤，“我如果不想测，可以要求暂停。但批不批准，是你们说了算？”
            - text: “确认。”系统的回答毫无犹豫，“当前阶段尚未进入高风险模块。基于你的提问行为，系统判定你具备主动沟通意愿及基本的焦虑管理倾向。是否在测试正式开始前，调取更多关于当前测试模块的简介信息？”
            - text: 屏障上的光网格开始缓慢地流动起来，像某种活物的呼吸节律。测试角色能感觉到自己后颈的毫毛竖了起来——不是恐惧，而是那种站在深渊边缘往下看时，身体先于理智做出的反应。
