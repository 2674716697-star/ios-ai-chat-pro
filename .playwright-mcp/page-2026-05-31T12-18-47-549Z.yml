            - text: 测站在一片纯白空间中，四周没有墙壁也没有天花板，脚下却是坚实的平面。他低头看了看自己的双手——一切都显得格外真实，却又透着某种人为的干净感。空气里没有任何气味，温度不冷不热，就像某个尚未填写参数的空白场景。
            - text: “一个测试世界。”他自言自语，声音被空间吞没，没有回声。
