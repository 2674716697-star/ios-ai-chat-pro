            - generic [ref=e106]: 我们被要求根据角色卡和世界设定进行互动。角色卡是“测”，身份是“测试者”，世界设定是“测试世界”。用户输入“hi”，这是简单的打招呼。我们需要以角色身份回复，并在末尾输出@@SCENE块。由于是初次互动，我们需要建立初始场景。按照规则，我们需要在回复里基于刚刚写出的正文更新状态。但这是开场，我们可以写一个简单的开场白，然后构造初始状态。世界设定很简短，我们可以发挥，但保持简单，毕竟测试世界。可以描述测在一个测试房间醒来，或者类似。然后输出状态块。注意格式要求：精神评分、身体细节至少2条、走向4条等。我们将创建一个初始场景：测站在一个空旷的白色房间里，感觉有点困惑。然后输出状态。
